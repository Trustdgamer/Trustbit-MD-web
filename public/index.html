<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trustbit MD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .neon-glow { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; font-family: 'Orbitron'; }
        .cyber-btn { background: #00f2ff; color: #000; transition: 0.4s; }
        .cyber-btn:hover { background: #0062ff; color: #fff; box-shadow: 0 0 30px #0062ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5">

    <div class="w-full max-w-sm flex gap-2 mb-4 text-center">
        <div class="glass p-3 rounded-2xl flex-1">
            <p class="text-[9px] text-gray-500">NG TIME</p>
            <p id="time" class="text-xs font-bold">00:00:00</p>
        </div>
        <div class="glass p-3 rounded-2xl flex-1">
            <p class="text-[9px] text-gray-500">RUNTIME</p>
            <p id="runtime" class="text-xs font-bold">0h 0m</p>
        </div>
    </div>

    <div class="glass w-full max-w-sm p-10 rounded-[3rem] shadow-2xl">
        <h1 class="text-3xl font-bold text-center neon-glow mb-2 uppercase">Trustbit MD</h1>
        <p class="text-center text-[10px] text-gray-500 tracking-[5px] mb-10">PAIRING V3</p>

        <div class="space-y-4">
            <input type="number" id="num" placeholder="234..." class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-400 text-center text-lg">
            <button id="btn" onclick="getCode()" class="w-full cyber-btn p-5 rounded-2xl font-bold uppercase text-xs tracking-widest">Get Pairing Code</button>
        </div>

        <div id="loader" class="hidden mt-8 flex justify-center"><div class="animate-spin h-6 w-6 border-2 border-cyan-400 border-t-transparent rounded-full"></div></div>

        <div id="result" class="hidden mt-10 text-center">
            <p class="text-[10px] text-cyan-400 mb-2">WHATSAPP CODE</p>
            <h2 id="pair-code" class="text-5xl font-bold tracking-[8px]"></h2>
        </div>
    </div>

    <script>
        async function updateStats() {
            const res = await fetch('/admin-data');
            const data = await res.json();
            document.getElementById('time').innerText = data.time;
            document.getElementById('runtime').innerText = data.runtime;
        }
        setInterval(updateStats, 1000);

        async function getCode() {
            const num = document.getElementById('num').value;
            const btn = document.getElementById('btn');
            if(!num) return alert("Enter number!");

            btn.disabled = true;
            btn.innerText = "LINKING...";
            document.getElementById('loader').classList.remove('hidden');

            try {
                const res = await fetch(`/code?number=${num}`);
                const data = await res.json();
                
                document.getElementById('loader').classList.add('hidden');
                btn.disabled = false;
                btn.innerText = "Get Pairing Code";

                if(data.code) {
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('pair-code').innerText = data.code;
                } else { alert("Error. Try again."); }
            } catch(e) { alert("Server Timeout. Click again."); location.reload(); }
        }
    </script>
</body>
</html>

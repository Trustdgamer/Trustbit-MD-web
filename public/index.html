<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trustbit MD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-text { font-family: 'Orbitron'; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .cyber-btn { background: linear-gradient(45deg, #00f2ff, #0062ff); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .cyber-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Top Stats -->
    <div class="w-full max-w-sm flex gap-3 mb-6">
        <div class="glass p-4 rounded-3xl flex-1 text-center">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">NG Time</p>
            <p id="time" class="text-xs font-bold text-cyan-400">00:00:00</p>
        </div>
        <div class="glass p-4 rounded-3xl flex-1 text-center">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Slots</p>
            <p class="text-xs font-bold text-cyan-400">Available</p>
        </div>
    </div>

    <!-- Main Card -->
    <div class="glass w-full max-w-sm p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
        <div class="absolute -top-20 -left-20 w-40 h-40 bg-cyan-500/10 rounded-full blur-3xl"></div>
        
        <h1 class="text-3xl font-bold text-center neon-text mb-2 tracking-tighter">TRUSTBIT MD</h1>
        <p class="text-center text-[10px] text-gray-500 uppercase tracking-[4px] mb-10">Pairing Server V3</p>

        <div class="space-y-5">
            <input type="number" id="num" placeholder="234..." class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-400 transition-all text-center text-lg">
            <button id="btn" onclick="getCode()" class="w-full cyber-btn p-5 rounded-2xl font-bold text-black uppercase text-xs tracking-widest active:scale-95 transition-all">Get Pairing Code</button>
        </div>

        <div id="loader" class="hidden mt-8 flex justify-center"><div class="animate-spin h-6 w-6 border-2 border-cyan-400 border-t-transparent rounded-full"></div></div>

        <div id="result" class="hidden mt-10 text-center animate-bounce">
            <p class="text-[10px] text-cyan-400 mb-2">WHATSAPP CODE</p>
            <h2 id="pair-code" class="text-5xl font-bold tracking-[10px]"></h2>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                const res = await fetch('/api/admin');
                const data = await res.json();
                document.getElementById('time').innerText = data.time;
            } catch(e) {}
        }
        setInterval(updateStats, 1000);

        async function getCode() {
            const num = document.getElementById('num').value;
            const btn = document.getElementById('btn');
            if(!num) return alert("Enter number!");

            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            try {
                const res = await fetch(`/api/code?number=${num}`);
                const data = await res.json();
                
                document.getElementById('loader').classList.add('hidden');
                btn.disabled = false;
                btn.innerText = "Get Pairing Code";

                if(data.code) {
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('pair-code').innerText = data.code;
                } else {
                    alert("WhatsApp took too long. Refresh and try again.");
                }
            } catch(e) {
                alert("Server Timeout. This is normal on first try. Try again.");
                location.reload();
            }
        }
    </script>
</body>
</html>

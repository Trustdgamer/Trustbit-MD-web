<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trustbit MD - Pairing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #0a192f, #020c1b);
            color: white;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .container {
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        h1 { font-weight: 600; color: #64ffda; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #8892b0; margin-bottom: 25px; }
        input {
            width: 100%; padding: 15px; margin-bottom: 20px;
            border-radius: 10px; border: none; outline: none;
            background: #112240; color: white; font-size: 1rem; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #64ffda; color: #020c1b; font-weight: 600;
            cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        button:hover { background: #4cc9ac; transform: translateY(-2px); }
        #pairingCode {
            margin-top: 25px; font-size: 2rem; font-weight: 600;
            color: #64ffda; letter-spacing: 5px; display: none;
            padding: 15px; border: 2px dashed #64ffda; border-radius: 10px;
        }
        .loader {
            display: none; width: 30px; height: 30px;
            border: 4px solid #f3f3f3; border-top: 4px solid #64ffda;
            border-radius: 50%; animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trustbit MD</h1>
        <p>Enter your phone number with country code (e.g. 23490...)</p>
        <input type="number" id="number" placeholder="2341234567890">
        <button onclick="getCode()">Get Pairing Code</button>
        <div id="loader" class="loader"></div>
        <div id="pairingCode"></div>
    </div>

    <script>
        async function getCode() {
            const num = document.getElementById('number').value;
            const codeDiv = document.getElementById('pairingCode');
            const loader = document.getElementById('loader');
            
            if (!num) return alert("Please enter your number!");
            
            loader.style.display = 'block';
            codeDiv.style.display = 'none';

            try {
                const response = await fetch(`/code?number=${num}`);
                const data = await response.json();
                loader.style.display = 'none';
                codeDiv.style.display = 'block';
                codeDiv.innerHTML = data.code;
            } catch (err) {
                loader.style.display = 'none';
                alert("Error getting code. Try again.");
            }
        }
    </script>
</body>
  </html>

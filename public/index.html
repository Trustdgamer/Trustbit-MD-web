<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trustbit MD - Cloud Pairing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Poppins', sans-serif; color: #f8fafc; }
        .neon-border { border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }
        .cyber-btn { background: linear-gradient(90deg, #06b6d4, #3b82f6); transition: 0.3s; }
        .cyber-btn:hover { box-shadow: 0 0 20px #06b6d4; transform: scale(1.02); }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <!-- Admin Top Bar -->
    <div class="w-full max-w-md grid grid-cols-2 gap-2 mb-6">
        <div class="bg-slate-900/50 p-3 rounded-xl neon-border text-center">
            <p class="text-[10px] text-cyan-400 uppercase tracking-widest">Nigeria Time</p>
            <p id="time" class="text-sm font-cyber">00:00:00</p>
        </div>
        <div class="bg-slate-900/50 p-3 rounded-xl neon-border text-center">
            <p class="text-[10px] text-cyan-400 uppercase tracking-widest">Bot Runtime</p>
            <p id="runtime" class="text-sm font-cyber">0h 0m</p>
        </div>
    </div>

    <!-- Main Card -->
    <div class="w-full max-w-md bg-slate-900 p-8 rounded-[2rem] shadow-2xl border border-white/5 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl"></div>
        
        <h1 class="text-3xl font-bold text-center mb-2 font-cyber bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">TRUSTBIT MD</h1>
        <p class="text-center text-slate-400 text-xs mb-8">Cloud Pairing System • Slots: <span id="slots">0/100</span></p>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] text-slate-500 ml-1 mb-1 block uppercase">WhatsApp Number</label>
                <input type="number" id="number" placeholder="23412345678" class="w-full bg-slate-800 border border-white/5 p-4 rounded-2xl focus:ring-2 focus:ring-cyan-500 outline-none">
            </div>
            
            <button onclick="getCode()" id="btn-text" class="w-full cyber-btn p-4 rounded-2xl font-bold text-slate-900 uppercase tracking-widest">Get Pairing Code</button>
        </div>

        <div id="loader" class="hidden py-6"><div class="animate-spin h-6 w-6 border-2 border-cyan-500 border-t-transparent rounded-full mx-auto"></div></div>

        <div id="code-display" class="hidden mt-8 text-center animate-bounce">
            <p class="text-xs text-cyan-400 mb-2">LINKING CODE</p>
            <div id="pair-code" class="text-5xl font-bold font-cyber tracking-widest text-white"></div>
        </div>
    </div>

    <script>
        async function updateAdmin() {
            const res = await fetch('/admin-data');
            const data = await res.json();
            document.getElementById('time').innerText = data.time;
            document.getElementById('runtime').innerText = data.runtime;
            document.getElementById('slots').innerText = data.slots;
        }
        setInterval(updateAdmin, 1000);

        async function getCode() {
            const num = document.getElementById('number').value;
            if(!num) return alert("Enter number!");
            
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('code-display').classList.add('hidden');

            try {
                const res = await fetch(`/code?number=${num}`);
                const data = await res.json();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('code-display').classList.remove('hidden');
                document.getElementById('pair-code').innerText = data.code;
            } catch(e) { alert("Error connecting to Trustbit server."); }
        }
    </script>
</body>
</html>

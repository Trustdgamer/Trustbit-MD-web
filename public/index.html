<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trustbit MD - Pairing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #010409; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(48, 54, 61, 1); }
        .neon-glow { text-shadow: 0 0 15px #58a6ff; font-family: 'Orbitron', sans-serif; }
        .btn-gradient { background: linear-gradient(90deg, #1f6feb, #58a6ff); box-shadow: 0 4px 15px rgba(31, 111, 235, 0.4); }
        input { border: 1px solid #30363d !important; background: #0d1117 !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-slate-100">

    <!-- Admin Data -->
    <div class="w-full max-w-sm flex justify-between mb-6 gap-2">
        <div class="glass p-3 rounded-2xl flex-1 text-center">
            <p class="text-[9px] uppercase tracking-widest text-blue-400">Time (NG)</p>
            <p id="time" class="text-xs font-bold">00:00:00</p>
        </div>
        <div class="glass p-3 rounded-2xl flex-1 text-center">
            <p class="text-[9px] uppercase tracking-widest text-blue-400">Runtime</p>
            <p id="runtime" class="text-xs font-bold">0h 0m</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] relative shadow-2xl">
        <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-blue-500/20 px-4 py-1 rounded-full border border-blue-500/50">
            <span class="text-[10px] font-bold text-blue-300">CLOUD V3</span>
        </div>

        <h1 class="text-3xl font-bold text-center neon-glow mb-2">TRUSTBIT MD</h1>
        <p class="text-center text-slate-500 text-[11px] mb-8 uppercase tracking-widest">Slots Used: <span id="slots" class="text-blue-400">0/100</span></p>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] text-slate-400 ml-2 mb-1 block">WHATSAPP NUMBER</label>
                <input type="number" id="number" placeholder="234123456789" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
            </div>

            <button onclick="getCode()" id="btn" class="w-full btn-gradient p-4 rounded-2xl font-bold text-white uppercase text-xs tracking-widest active:scale-95 transition-all">
                Get Pairing Code
            </button>
        </div>

        <!-- Result Box -->
        <div id="loader" class="hidden mt-6 flex justify-center"><div class="animate-spin h-5 w-5 border-2 border-blue-500 border-t-transparent rounded-full"></div></div>
        
        <div id="code-display" class="hidden mt-8 text-center animate-pulse">
            <p class="text-[10px] text-blue-400 mb-2">ENTER THIS ON WHATSAPP</p>
            <h2 id="pair-code" class="text-4xl font-bold tracking-[8px] text-white"></h2>
        </div>
    </div>

    <script>
        async function updateStats() {
            const res = await fetch('/admin-data');
            const data = await res.json();
            document.getElementById('time').innerText = data.time;
            document.getElementById('runtime').innerText = data.runtime;
            document.getElementById('slots').innerText = data.slots;
        }
        setInterval(updateStats, 1000);

        async function getCode() {
            const num = document.getElementById('number').value;
            if(!num) return alert("Please enter number");
            
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('code-display').classList.add('hidden');

            try {
                const res = await fetch(`/code?number=${num}`);
                const data = await res.json();
                document.getElementById('loader').classList.add('hidden');
                
                if(data.code) {
                    document.getElementById('code-display').classList.remove('hidden');
                    document.getElementById('pair-code').innerText = data.code;
                } else {
                    alert("Error generating code. Check connection.");
                }
            } catch(e) { alert("Server Down"); }
        }
    </script>
</body>
</html>
